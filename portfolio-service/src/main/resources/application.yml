# src/main/resources/application.yml
spring:
  application:
    name: yabbydev-portfolio
  datasource:
    # Session pooler (port 5432) — better for Hibernate/JPA than transaction pooler (6543).
    # Username must include the project ref for the pooler: postgres.[project-ref]
    url: ${DATABASE_URL:jdbc:postgresql://aws-1-eu-central-1.pooler.supabase.com:6543/postgres?sslmode=require}
    username: ${DATABASE_USERNAME:postgres.ftzcvonwpsaudrijobkj}
    password: ${DATABASE_PASSWORD:Vy.7d*ABaAa!T9a}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      data-source-properties:
        prepareThreshold: 0
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

